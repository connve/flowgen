# Shared configuration across components.

# Cache service configuration (optional, shared across worker and server).
# The cache is used for:
# - State persistence across workflow executions (e.g., replay identifiers)
# - Distributed coordination and leader election via atomic operations
# When enabled with NATS, provides distributed lease management across multiple instances.
# When disabled, falls back to in-memory cache (suitable for single-instance deployments only).
cache:
  enabled: true
  credentials_path: "path_to_credentials"
  url: "url_of_cache"
  db_name: "cache_db_name"
  type: nats

# Flow discovery configuration (shared across worker and server).
# Flows can be loaded from one of two sources:
#   1. Local filesystem via `path` (default).
#   2. Distributed cache via `cache` (synced from Git by flowgen-server).
# If both are set, `cache` takes precedence and `path` is ignored.
flows:
  # Local filesystem path. Can be either a base directory (recursively loads all
  # .yaml, .yml, and .json files) or a glob pattern (e.g., "flows/*.yaml").
  path: "path_to_configs_folder"

  # Optional cache-based flow loading.
  # When enabled, the worker lists keys from the distributed cache under `prefix`
  # and loads each flow's YAML. The server syncs flows from Git to the same cache.
  # Requires `cache.enabled: true` above.
  # Uses a separate metadata bucket from the runtime cache to avoid key collisions.
  # cache:
  #   enabled: true
  #   # Optional cache key prefix (defaults to "flowgen.flows").
  #   # Must match the prefix used by flowgen-server when syncing flows.
  #   prefix: "flowgen.flows"
  #   # Optional metadata bucket name (defaults to "flowgen_metadata").
  #   # Must match the db_name used by flowgen-server.
  #   db_name: "flowgen_metadata"

# Resource loading configuration (optional, shared across worker and server).
# Enables loading external files (SQL queries, templates, etc.) instead of embedding content in YAML.
# Same two-source model as `flows`: filesystem `path` or distributed `cache`.
# If both are set, `cache` takes precedence and `path` is ignored.
flow_resources:
  # Base directory for resource files. Resource keys resolve relative to this path.
  # Example: with path="local/resources/", key="queries/orders.sql" resolves to
  # "local/resources/queries/orders.sql".
  path: "path_to_resources_folder"

  # Optional cache-based resource loading.
  # When enabled, resources are loaded from the distributed cache under `prefix`.
  # Requires `cache.enabled: true` above.
  # cache:
  #   enabled: true
  #   # Optional cache key prefix (defaults to "flowgen.resources").
  #   # Must match the prefix used by flowgen-server when syncing resources.
  #   prefix: "flowgen.resources"
  #   # Optional metadata bucket name (defaults to "flowgen_metadata").
  #   db_name: "flowgen_metadata"

# OpenTelemetry configuration for metrics and distributed tracing (optional).
# Exports metrics and traces to an OTLP endpoint (e.g., OpenTelemetry Collector, Grafana Cloud, Honeycomb).
telemetry:
  enabled: false
  # Optional: OTLP endpoint (defaults to "http://localhost:4317").
  # otlp_endpoint: "http://localhost:4317"
  # Optional: service name (defaults to "flowgen").
  # service_name: "flowgen"
  # Optional: metrics export interval using human-readable format (defaults to "60s").
  # metrics_export_interval: "60s"

# Worker component configuration.
worker:
  # HTTP server for webhooks, health checks, and metrics (optional, defaults to port 3000).
  http_server:
    enabled: true
    port: 3000
    # Optional path prefix for all routes (e.g., "/api/flowgen/workers").
    routes_prefix: "/api/flowgen/workers"

  # Event channel buffer size (optional, defaults to 10M).
  # Controls memory allocation for broadcast channel between tasks.
  # Memory usage: ~buffer_size * 128 bytes (e.g., 10M = ~1.2 GB, 50M = ~6 GB).
  # Adjust based on available memory and workload volume.
  # event_buffer_size: 10000000

