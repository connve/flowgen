# Shared configuration across components.

# Cache service configuration (optional, shared across worker and server).
# The cache is used for:
# - State persistence across workflow executions (e.g., replay identifiers)
# - Distributed coordination and leader election via atomic operations
# When enabled with NATS, provides distributed lease management across multiple instances.
# When disabled, falls back to in-memory cache (suitable for single-instance deployments only).
cache:
  enabled: true
  credentials_path: "path_to_credentials"
  url: "url_of_cache"
  db_name: "cache_db_name"
  type: nats
  # Optional: number of historical entries retained per key (defaults to 10).
  # Only applies when the KV bucket is first created.
  # history: 10
  # Optional: TTL for KV delete/purge tombstone markers (defaults to 1h).
  # Must be set for per-key TTLs on cache entries to work at all.
  # Only applies when the KV bucket is first created.
  # tombstone_ttl: "1h"

# Flow discovery configuration (shared across worker and server).
# Path can be either a base directory path (e.g., "flows") - recursively loads all .yaml, .yml, and .json files.
flows:
  path: "path_to_configs_folder"

# Resource loading configuration (optional, shared across worker and server).
# Enables loading external files (SQL queries, templates, etc.) instead of embedding content in YAML.
flow_resources:
  path: "path_to_resources_folder"

# OpenTelemetry configuration for metrics and distributed tracing (optional).
# Exports metrics and traces to an OTLP endpoint (e.g., OpenTelemetry Collector, Grafana Cloud, Honeycomb).
telemetry:
  enabled: false
  # Optional: OTLP endpoint (defaults to "http://localhost:4317").
  # otlp_endpoint: "http://localhost:4317"
  # Optional: service name (defaults to "flowgen").
  # service_name: "flowgen"
  # Optional: metrics export interval using human-readable format (defaults to "60s").
  # metrics_export_interval: "60s"

# Worker component configuration.
worker:
  # HTTP server for webhooks, health checks, and metrics (optional, defaults to port 3000).
  http_server:
    enabled: true
    port: 3000
    # Optional path prefix for all routes (e.g., "/api/flowgen/workers").
    path: "/api/flowgen/workers"
    # Optional credentials file for webhook authentication.
    # Individual http_webhook tasks can override this with their own credentials_path.
    # credentials_path: "/etc/http/credentials.json"

    # Optional user authentication provider for JWT, OIDC, or session token validation.
    # Shared across all HTTP-facing tasks (http_webhook, llm_proxy, mcp_tool).
    # Tasks opt in with auth.required: true in their config.

    # JWT with local HMAC secret:
    # auth:
    #   type: jwt
    #   secret: "your-hmac-secret"
    #   audience: "flowgen-api"        # optional: validate audience claim
    #   issuer: "https://auth.example.com"  # optional: validate issuer claim
    #   user_id_claim: "sub"           # optional: claim to extract as user_id (defaults to "sub")

    # JWT with remote JWKS (RS256/ES256):
    # auth:
    #   type: jwt
    #   jwks_url: "https://auth.example.com/.well-known/jwks.json"
    #   audience: "flowgen-api"

    # OIDC discovery (auto-fetches JWKS from issuer):
    # auth:
    #   type: oidc
    #   issuer_url: "https://auth.example.com/realms/myapp"
    #   audience: "flowgen-api"

    # Session token validation via external HTTP endpoint:
    # auth:
    #   type: session
    #   validation_url: "https://auth.example.com/validate"
    #   user_id_field: "user_id"       # optional: JSON field in response (defaults to "user_id")

  # MCP server configuration for exposing flows as MCP tools (optional).
  # Runs on its own port, independent of the HTTP server.
  # Must be explicitly enabled for mcp_tool tasks to be registered.
  # Global credentials apply to all mcp_tool endpoints unless overridden per tool.
  # mcp_server:
  #   enabled: true
  #   port: 3001
  #   path: "/mcp"
  #   credentials_path: "/etc/mcp/api-keys.json"

  # Event channel buffer size (optional, defaults to 10M).
  # Controls memory allocation for broadcast channel between tasks.
  # Memory usage: ~buffer_size * 128 bytes (e.g., 10M = ~1.2 GB, 50M = ~6 GB).
  # Adjust based on available memory and workload volume.
  # event_buffer_size: 10000000

