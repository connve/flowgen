{{- $gw := .Values.wireguardGateway -}}
{{- if $gw.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flowgen.fullname" . }}-wireguard-gateway
  labels:
    {{- include "flowgen.labels" . | nindent 4 }}
    app.kubernetes.io/component: wireguard-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "flowgen.wireguardGateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flowgen.wireguardGateway.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
          - name: net.ipv4.conf.all.src_valid_mark
            value: "1"
      initContainers:
        - name: setup-networking
          image: "{{ $gw.image.repository }}:{{ $gw.image.tag }}"
          command: ["sh", "-c"]
          args:
            - |
              sysctl -w net.ipv4.ip_forward=1 || true
              iptables -t nat -A POSTROUTING -o wg+ -j MASQUERADE
              iptables -A FORWARD -i eth0 -o wg+ -j ACCEPT
              iptables -A FORWARD -i wg+ -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT
          securityContext:
            {{- toYaml $gw.securityContext | nindent 12 }}
      containers:
        - name: wireguard
          image: "{{ $gw.image.repository }}:{{ $gw.image.tag }}"
          imagePullPolicy: {{ $gw.image.pullPolicy }}
          securityContext:
            {{- toYaml $gw.securityContext | nindent 12 }}
          env:
          {{- with $gw.env }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          volumeMounts:
          {{- range $gw.tunnels }}
            - name: {{ .name }}-config
              mountPath: /config/{{ .name }}.conf
              subPath: {{ .name }}.conf
              readOnly: true
          {{- end }}
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
          resources:
            {{- toYaml $gw.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "wg show wg0 2>/dev/null | grep -q 'latest handshake'"]
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "wg show wg0 2>/dev/null | grep -q 'latest handshake'"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
        - name: port-forward
          image: {{ $gw.socat.image }}
          command: ["sh", "-c"]
          args:
            - |
              {{- range $gw.tunnels }}
              {{- range .portForwards }}
              socat TCP-LISTEN:{{ .port }},fork,reuseaddr TCP:{{ .targetHost }}:{{ .targetPort }} &
              {{- end }}
              {{- end }}
              wait
          ports:
          {{- range $gw.tunnels }}
          {{- range .portForwards }}
            - containerPort: {{ .port }}
              name: {{ .name }}
              protocol: TCP
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml $gw.socat.resources | nindent 12 }}
      volumes:
      {{- range $gw.tunnels }}
        - name: {{ .name }}-config
          secret:
            secretName: {{ .secretName }}
            defaultMode: 0440
      {{- end }}
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
      {{- with $gw.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $gw.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $gw.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
