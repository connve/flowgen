{{- $worker := index .Values "flowgen-worker" -}}
{{- if and (or (not $worker.flowResources.existingConfigMaps) (eq (len $worker.flowResources.existingConfigMaps) 0)) $worker.flowResources.inline }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flowgen-worker.fullname" . }}-resources
  labels:
    {{- include "flowgen-worker.labels" . | nindent 4 }}
data:
{{- range $filename, $content := $worker.flowResources.inline }}
  {{ $filename }}: |
{{ $content | indent 4 }}
{{- end }}
{{- end }}
