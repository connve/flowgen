{{- $worker := index .Values "flowgen-worker" -}}
{{- if $worker.enabled }}
{{- if and (not $worker.config.existingConfigMap) $worker.config.inline }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flowgen-worker.fullname" . }}-config
  labels:
    {{- include "flowgen-worker.labels" . | nindent 4 }}
data:
  config.yaml: |
{{- $worker.config.inline | nindent 4 }}
{{- end }}
{{- end }}
