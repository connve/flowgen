{{- $worker := index .Values "flowgen" -}}
{{- $root := . -}}
{{- if $worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flowgen.fullname" . }}
  labels:
    {{- include "flowgen.labels" . | nindent 4 }}
  {{- with $worker.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not $worker.autoscaling.enabled }}
  replicas: {{ $worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "flowgen.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with $worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "flowgen.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flowgen.serviceAccountName" . }}
      {{- with $worker.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml $worker.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        command: ["/bin/flowgen", "--config", "{{ $worker.config.path }}"]
        securityContext:
          {{- toYaml $worker.securityContext | nindent 12 }}
        image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        {{- with $worker.lifecycle }}
        lifecycle:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        {{- with $worker.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ $worker.http_server.port }}
          protocol: TCP
        {{- if $worker.mcp_server }}
        - name: mcp
          containerPort: {{ $worker.mcp_server.port }}
          protocol: TCP
        {{- end }}
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        resources:
          {{- toYaml $worker.resources | nindent 12 }}
        volumeMounts:
        # Writable /tmp for tasks that need scratch space (e.g. git_sync
        # cloning into /tmp/flowgen-repo). Required because the container
        # runs with readOnlyRootFilesystem: true.
        - name: tmp
          mountPath: /tmp
        {{- range $key, $volume := $worker.volumes }}
        {{- if and (hasKey $volume "enabled") $volume.enabled }}
        {{- if eq $key "flows" }}
        {{- if and $worker.flows.existingConfigMaps (gt (len $worker.flows.existingConfigMaps) 0) }}
        {{- range $idx, $cm := $worker.flows.existingConfigMaps }}
        {{- if kindIs "string" $cm }}
        - name: {{ $key | kebabcase }}-{{ $idx }}
          mountPath: {{ $volume.mountPath }}/{{ $idx }}
          {{- if hasKey $volume "readOnly" }}
          readOnly: {{ $volume.readOnly }}
          {{- else }}
          readOnly: true
          {{- end }}
        {{- else }}
        - name: {{ $key | kebabcase }}-{{ $idx }}
          mountPath: {{ $cm.mountPath | default (printf "%s/%d" $volume.mountPath $idx) }}
          {{- if hasKey $volume "readOnly" }}
          readOnly: {{ $volume.readOnly }}
          {{- else }}
          readOnly: true
          {{- end }}
        {{- end }}
        {{- end }}
        {{- else }}
        - name: {{ $key | kebabcase }}
          mountPath: {{ $volume.mountPath }}
          {{- if hasKey $volume "readOnly" }}
          readOnly: {{ $volume.readOnly }}
          {{- else }}
          readOnly: true
          {{- end }}
        {{- end }}
        {{- else if eq $key "flowResources" }}
        {{- if and $worker.flowResources.existingConfigMaps (gt (len $worker.flowResources.existingConfigMaps) 0) }}
        {{- range $idx, $cm := $worker.flowResources.existingConfigMaps }}
        {{- if kindIs "string" $cm }}
        - name: {{ $key | kebabcase }}-{{ $idx }}
          mountPath: {{ $volume.mountPath }}/{{ $idx }}
          {{- if hasKey $volume "readOnly" }}
          readOnly: {{ $volume.readOnly }}
          {{- else }}
          readOnly: true
          {{- end }}
        {{- else }}
        - name: {{ $key | kebabcase }}-{{ $idx }}
          mountPath: {{ $cm.mountPath | default (printf "%s/%d" $volume.mountPath $idx) }}
          {{- if hasKey $volume "readOnly" }}
          readOnly: {{ $volume.readOnly }}
          {{- else }}
          readOnly: true
          {{- end }}
        {{- end }}
        {{- end }}
        {{- else }}
        - name: {{ $key | kebabcase }}
          mountPath: {{ $volume.mountPath }}
          {{- if hasKey $volume "readOnly" }}
          readOnly: {{ $volume.readOnly }}
          {{- else }}
          readOnly: true
          {{- end }}
        {{- end }}
        {{- else }}
        - name: {{ $key | kebabcase }}
          mountPath: {{ $volume.mountPath }}
          {{- if hasKey $volume "readOnly" }}
          readOnly: {{ $volume.readOnly }}
          {{- else }}
          readOnly: true
          {{- end }}
        {{- end }}
        {{- end }}
        {{- end }}
      volumes:
      # Ephemeral writable /tmp paired with the volumeMount above. Cleared
      # on pod restart, which doubles as a guarantee that git_sync re-clones
      # the repository on every restart instead of trying to pull a stale
      # working tree from a previous pod.
      - name: tmp
        emptyDir: {}
      {{- range $key, $volume := $worker.volumes }}
      {{- if and (hasKey $volume "enabled") $volume.enabled }}
      {{- if $volume.secretName }}
      - name: {{ $key | kebabcase }}
        secret:
          secretName: {{ $volume.secretName }}
          defaultMode: 0440
      {{- else if eq $key "flows" }}
      {{- if and $worker.flows.existingConfigMaps (gt (len $worker.flows.existingConfigMaps) 0) }}
      {{- range $idx, $cm := $worker.flows.existingConfigMaps }}
      - name: {{ $key | kebabcase }}-{{ $idx }}
        configMap:
          {{- if kindIs "string" $cm }}
          name: {{ $cm }}
          {{- else }}
          name: {{ $cm.name }}
          {{- end }}
      {{- end }}
      {{- else }}
      - name: {{ $key | kebabcase }}
        configMap:
          name: {{ printf "%s-flows" (include "flowgen.fullname" $root) }}
      {{- end }}
      {{- else if eq $key "flowResources" }}
      {{- if and $worker.flowResources.existingConfigMaps (gt (len $worker.flowResources.existingConfigMaps) 0) }}
      {{- range $idx, $cm := $worker.flowResources.existingConfigMaps }}
      - name: {{ $key | kebabcase }}-{{ $idx }}
        configMap:
          {{- if kindIs "string" $cm }}
          name: {{ $cm }}
          {{- else }}
          name: {{ $cm.name }}
          {{- end }}
      {{- end }}
      {{- else }}
      - name: {{ $key | kebabcase }}
        configMap:
          name: {{ printf "%s-resources" (include "flowgen.fullname" $root) }}
      {{- end }}
      {{- else if eq $key "config" }}
      - name: {{ $key | kebabcase }}
        configMap:
          {{- if $worker.config.existingConfigMap }}
          name: {{ $worker.config.existingConfigMap }}
          {{- else if $worker.config.inline }}
          name: {{ printf "%s-config" (include "flowgen.fullname" $root) }}
          {{- else if $volume.configMapName }}
          name: {{ $volume.configMapName }}
          {{- end }}
      {{- else if $volume.configMapName }}
      - name: {{ $key | kebabcase }}
        configMap:
          name: {{ $volume.configMapName }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- with $worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
