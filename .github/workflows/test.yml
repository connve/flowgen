name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test-rust-latest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    # Reads channel + components from `rust-toolchain.toml`.
    - uses: dtolnay/rust-toolchain@stable
    - name: Install system dependencies
      run: |
        sudo apt update -qq
        sudo apt-get -qq install pkg-config libssl-dev protobuf-compiler git
    - name: Add rustfmt and build
      run: |
        rustup component add rustfmt
        cargo build --verbose
        cargo test --verbose
        cargo fmt --all

  test-rust-nightly:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    # Explicit nightly override — `rust-toolchain.toml` pins stable, but
    # this job intentionally exercises the nightly channel.
    - uses: dtolnay/rust-toolchain@nightly
    - name: Install system dependencies
      run: |
        sudo apt update -qq
        sudo apt-get -qq install pkg-config libssl-dev protobuf-compiler git
    - name: Add rustfmt and build
      run: |
        rustup component add rustfmt
        cargo build --verbose
        cargo test --verbose
        cargo fmt --all

  # Enforces the `rust-version` (MSRV) declared in `Cargo.toml` by
  # compiling the workspace with that exact toolchain. Without this
  # job the field is a promise, not a contract — a dependency bump
  # that raises the minimum silently would only be caught by a
  # downstream consumer building on an older Rust.
  test-msrv:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: "1.88"
    - name: Install system dependencies
      run: |
        sudo apt update -qq
        sudo apt-get -qq install pkg-config libssl-dev protobuf-compiler git
    - name: Compile with MSRV
      run: cargo +1.88 check --workspace --locked --verbose

  # Runs `#[ignore]`-marked integration tests that spin up real
  # containers via testcontainers (currently: `oci_sync` against
  # `registry:2.8.3`). Separated from the main suite so a registry
  # image pull hiccup does not fail the fast unit-test job.
  test-integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    # Reads channel + components from `rust-toolchain.toml`.
    - uses: dtolnay/rust-toolchain@stable
    - name: Install system dependencies
      run: |
        sudo apt update -qq
        sudo apt-get -qq install pkg-config libssl-dev protobuf-compiler git
    - name: Run oci_sync integration tests
      run: cargo test -p flowgen_oci --test sync_integration -- --ignored --nocapture