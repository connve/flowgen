name: Deploy Docs to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Write .env
        working-directory: docs
        run: |
          echo "PUBLIC_POSTHOG_KEY=${{ vars.PUBLIC_POSTHOG_KEY }}" >> .env
          echo "PUBLIC_POSTHOG_HOST=${{ vars.PUBLIC_POSTHOG_HOST }}" >> .env
          echo "PUBLIC_POSTHOG_UI_HOST=${{ vars.PUBLIC_POSTHOG_UI_HOST }}" >> .env

      - name: Build
        working-directory: docs
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/build --project-name=flowgen-docs --branch=main
