name: Release Flowgen

on:
  push:
    branches:
      - main

jobs:
  detect-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.detect-and-tag.outputs.tag }}
      previous-tag: ${{ steps.detect-and-tag.outputs.previous-tag }}
      version-changed: ${{ steps.detect-and-tag.outputs.tag != '' && steps.detect-and-tag.outputs.tag != steps.detect-and-tag.outputs.previous-tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "flowgen") | .version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Detect and tag new version
        id: detect-and-tag
        uses: salsify/action-detect-and-tag-new-version@v2
        with:
          version-command: |
            cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "flowgen") | .version'

  build-docker:
    needs: detect-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate cache key
        id: platform
        run: |
          PAIR=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "pair=$PAIR" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          build-args: |
            SERVICE_NAME=flowgen
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ steps.platform.outputs.pair }}
          cache-to: type=gha,scope=${{ steps.platform.outputs.pair }},mode=max
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-docker:
    needs: [detect-version, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: tags
        run: |
          VERSION=${{ needs.detect-version.outputs.version }}
          TAGS="ghcr.io/${{ github.repository }}:latest"

          if [ "${{ needs.detect-version.outputs.version-changed }}" == "true" ]; then
            TAGS="$TAGS,ghcr.io/${{ github.repository }}:$VERSION"
            MAJOR_MINOR=$(echo $VERSION | cut -d. -f1,2)
            TAGS="$TAGS,ghcr.io/${{ github.repository }}:$MAJOR_MINOR"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          TAGARGS=$(echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' | xargs -I {} echo "-t {}")
          docker buildx imagetools create $TAGARGS \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

  create-release:
    needs: [detect-version, merge-docker]
    if: needs.detect-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          # Extract the section for the current version from CHANGELOG.md.
          # Matches from "## VERSION" until the next "## " header or end of file.
          CHANGELOG=$(awk "/^## ${VERSION}/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)

          if [ -z "$CHANGELOG" ]; then
            # Fall back to git log if no CHANGELOG.md entry exists for this version.
            if [ -z "${{ needs.detect-version.outputs.previous-tag }}" ]; then
              CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -1)
            else
              CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges ${{ needs.detect-version.outputs.previous-tag }}..${{ needs.detect-version.outputs.tag }})
            fi
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.detect-version.outputs.tag }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          printf '## Changes in %s\n\n%s\n' "$TAG" "$CHANGELOG" > release-notes.md
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file release-notes.md

  extract-linux-binaries:
    needs: [detect-version, create-release]
    if: needs.detect-version.outputs.version-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            name: flowgen-linux-amd64
          - arch: arm64
            platform: linux/arm64
            name: flowgen-linux-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract binary from Docker image
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository }}:${VERSION}"
          docker create --platform ${{ matrix.platform }} --name extract "${IMAGE}"
          docker cp extract:/bin/flowgen ./flowgen
          docker rm extract

      - name: Package binary
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          ARCHIVE="${{ matrix.name }}-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" flowgen
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.detect-version.outputs.tag }}" "${{ env.ARCHIVE }}" --clobber

  build-macos-binaries:
    needs: [detect-version, create-release]
    if: needs.detect-version.outputs.version-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: flowgen-darwin-amd64
          - target: aarch64-apple-darwin
            name: flowgen-darwin-arm64
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: brew install protobuf

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin flowgen

      - name: Package binary
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          ARCHIVE="${{ matrix.name }}-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" flowgen
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.detect-version.outputs.tag }}" "${{ env.ARCHIVE }}" --clobber
