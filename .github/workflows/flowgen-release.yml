name: Release Flowgen

on:
  push:
    branches:
      - main

jobs:
  detect-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.detect-and-tag.outputs.tag }}
      previous-tag: ${{ steps.detect-and-tag.outputs.previous-tag }}
      version-changed: ${{ steps.detect-and-tag.outputs.tag != '' && steps.detect-and-tag.outputs.tag != steps.detect-and-tag.outputs.previous-tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "flowgen") | .version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Detect and tag new version
        id: detect-and-tag
        uses: salsify/action-detect-and-tag-new-version@v2
        with:
          version-command: |
            cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "flowgen") | .version'

  build-and-push-docker:
    needs: detect-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: tags
        run: |
          VERSION=${{ needs.detect-version.outputs.version }}
          TAGS="ghcr.io/${{ github.repository }}:latest"

          if [ "${{ needs.detect-version.outputs.version-changed }}" == "true" ]; then
            TAGS="$TAGS,ghcr.io/${{ github.repository }}:$VERSION"

            # Add major.minor tag (e.g., 0.1) for convenience
            MAJOR_MINOR=$(echo $VERSION | cut -d. -f1,2)
            TAGS="$TAGS,ghcr.io/${{ github.repository }}:$MAJOR_MINOR"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          sbom: false
          build-args: |
            SERVICE_NAME=flowgen
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: [detect-version, build-and-push-docker]
    if: needs.detect-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          if [ -z "${{ needs.detect-version.outputs.previous-tag }}" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -1)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges ${{ needs.detect-version.outputs.previous-tag }}..${{ needs.detect-version.outputs.tag }})
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.detect-version.outputs.tag }}" \
            --title "Release ${{ needs.detect-version.outputs.tag }}" \
            --notes "## Changes in ${{ needs.detect-version.outputs.tag }}

          ${{ steps.changelog.outputs.changelog }}"

  extract-linux-binaries:
    needs: [detect-version, create-release]
    if: needs.detect-version.outputs.version-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            name: flowgen-linux-amd64
          - arch: arm64
            platform: linux/arm64
            name: flowgen-linux-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract binary from Docker image
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository }}:${VERSION}"
          docker create --platform ${{ matrix.platform }} --name extract "${IMAGE}"
          docker cp extract:/bin/flowgen ./flowgen
          docker rm extract

      - name: Package binary
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          ARCHIVE="${{ matrix.name }}-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" flowgen
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.detect-version.outputs.tag }}" "${{ env.ARCHIVE }}" --clobber

  build-macos-binaries:
    needs: [detect-version, create-release]
    if: needs.detect-version.outputs.version-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            name: flowgen-darwin-amd64
          - os: macos-latest
            name: flowgen-darwin-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: brew install protobuf

      - name: Build binary
        run: cargo build --release --locked --bin flowgen

      - name: Package binary
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          ARCHIVE="${{ matrix.name }}-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" -C target/release flowgen
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.detect-version.outputs.tag }}" "${{ env.ARCHIVE }}" --clobber
