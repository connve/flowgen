# Upsert a Salesforce record by external ID.
#
# Accepts record data via webhook, upserts into Salesforce, and returns
# the result. Swap http_webhook for mcp_tool to expose as an MCP tool.
#
# Required:
#   - /etc/sfdc/credentials.json
flow:
  name: salesforce_sobject_upsert
  tasks:

    - http_webhook:
        name: receive_request
        method: POST
        endpoint: /salesforce/upsert

    - salesforce_restapi_sobject:
        name: upsert_record
        operation: upsert
        credentials_path: /etc/sfdc/credentials.json
        sobject_type: "{{event.data.sobject_type}}"
        external_id_field: "{{event.data.external_id_field}}"
        external_id_value: "{{event.data.external_id_value}}"
        payload:
          from_event: true
