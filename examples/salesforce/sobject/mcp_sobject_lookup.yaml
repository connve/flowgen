# Look up a Salesforce record by ID, exposed as an MCP tool.
#
# Same flow as sobject_lookup.yaml but with mcp_tool as the entrypoint
# instead of http_webhook. LLM agents can discover and call this tool
# via the MCP server.
#
# Required:
#   - /etc/sfdc/credentials.json
#   - MCP server enabled in worker config
flow:
  name: salesforce_mcp_sobject_lookup
  tasks:

    - mcp_tool:
        name: salesforce_lookup
        description: "Look up a Salesforce record by object type and record ID."
        input_schema:
          type: object
          properties:
            sobject_type:
              type: string
              description: "Salesforce object type (e.g. Account, Contact, Opportunity)"
            record_id:
              type: string
              description: "Salesforce record ID"
            fields:
              type: string
              description: "Comma-separated list of fields to return"
          required: [sobject_type, record_id]

    - salesforce_restapi_sobject:
        name: get_record
        operation: get
        credentials_path: /etc/sfdc/credentials.json
        sobject_type: "{{event.data.sobject_type}}"
        record_id: "{{event.data.record_id}}"
        fields: "{{event.data.fields}}"
