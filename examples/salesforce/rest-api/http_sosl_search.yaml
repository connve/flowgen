# Search Salesforce records using SOSL.
#
# Accepts a search term via webhook, executes a SOSL query, and returns
# matching records. Swap http_webhook for mcp_tool to expose as an MCP tool.
#
# Required:
#   - /etc/sfdc/credentials.json
flow:
  name: salesforce_sosl_search
  tasks:

    - http_webhook:
        name: receive_request
        method: POST
        endpoint: /salesforce/search

    - salesforce_restapi_search:
        name: sosl_search
        credentials_path: /etc/sfdc/credentials.json
        query: "FIND {{{event.data.search_term}}} IN ALL FIELDS RETURNING Account(Id, Name, Industry), Contact(Id, FirstName, LastName, Email)"
