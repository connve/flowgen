# Bootstrap flow: reconciles resource files (sql, soql, json, txt, etc.)
# from an OCI artifact into the system NATS KV cache. Each tick pulls
# the artifact, writes one cache entry per layer keyed by its file path
# under `flowgen.resources.`, and deletes cache entries no longer
# present in the artifact.
#
# Once running, the runtime `ResourceLoader` reads files back via
# `ctx.resource.get("<path>")` from scripts and through the same key
# from processors that accept `resource: <path>`.
#
# Pair with `system_sync_flows.yaml` so flow YAML changes and resource
# changes can be redeployed independently.
#
# Required:
#   - /etc/flowgen/credentials/registry.json with either
#       { "username": "...", "password": "..." }
#     or a Docker config.json payload (kubernetes.io/dockerconfigjson).
#   - /etc/nats/credentials.json for NATS KV writes.
flow:
  name: system_sync_resources
  require_leader_election: true
  tasks:

    - generate:
        name: tick
        interval: "30s"

    - oci_sync:
        name: pull_repo
        artifact: "registry.example.com/your-org/your-resources:prod"
        credentials_path: /etc/flowgen/credentials/registry.json

    - buffer:
        name: collect_layers
        size: 10000
        timeout: "5s"

    - script:
        name: stash_layers
        code: |
          ctx.meta.layer_batch = event.data.batch;
          event

    - nats_kv_store:
        name: list_existing
        credentials_path: /etc/nats/credentials.json
        bucket: flowgen_system
        operation: list
        key_prefix: "flowgen.resources."

    # Short-circuit only when nothing has drifted: the artifact digest
    # matches the last successful sync AND the cache key count matches
    # the layer count from the artifact. Anything else (new digest, key
    # missing from cache, extra stale key) drops through so compute_diff
    # runs and converges the cache back to the artifact state.
    - script:
        name: skip_if_in_sync
        code: |
          let current_digest = event.meta.layer_batch[0].artifact_digest;
          let last_synced = ctx.cache.get("last_synced_digest");
          let layer_count = event.meta.layer_batch.len();
          let key_count = event.data.keys.len();
          if last_synced == current_digest && layer_count == key_count {
              ()
          } else {
              ctx.meta.current_digest = current_digest;
              event
          }

    # Compute the diff: each layer becomes a put keyed by its path,
    # each cache key with no matching layer becomes a delete.
    - script:
        name: compute_diff
        code: |
          let layers = event.meta.layer_batch;
          let existing = event.data.keys;
          let present = #{};
          let actions = [];
          for layer in layers {
              let key = "flowgen.resources." + layer.path;
              present[key] = true;
              actions.push(#{
                  action: "put",
                  key: key,
                  content: layer.content,
              });
          }
          for key in existing {
              if present[key] != true {
                  actions.push(#{
                      action: "delete",
                      key: key,
                      content: "",
                  });
              }
          }
          actions

    # Log every action (put or delete) at info so a stuck or surprising
    # diff is visible without `RUST_LOG=debug`. `include_meta` is left
    # at its default of false because `stash_layers` parked the full
    # layer batch — including resource content — on meta to survive
    # `list_existing`, and we do not want that dumped into every log
    # line.
    - log:
        name: log_actions
        level: info

    - script:
        name: select_puts
        code: |
          if event.data.action == "put" {
              event
          } else {
              ()
          }
        depends_on: [log_actions]

    - script:
        name: select_deletes
        code: |
          if event.data.action == "delete" {
              event
          } else {
              ()
          }
        depends_on: [log_actions]

    - nats_kv_store:
        name: write_to_cache
        credentials_path: /etc/nats/credentials.json
        bucket: flowgen_system
        operation: put
        key: "{{event.data.key}}"
        depends_on: [select_puts]

    - nats_kv_store:
        name: delete_from_cache
        credentials_path: /etc/nats/credentials.json
        bucket: flowgen_system
        operation: delete
        key: "{{event.data.key}}"
        depends_on: [select_deletes]

    - script:
        name: mark_synced
        code: |
          ctx.cache.put("last_synced_digest", event.meta.current_digest);
          event
        depends_on: [write_to_cache, delete_from_cache]
